<!DOCTYPE html>
<html>

<head>
<title>FitForge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>FitForge</h1>

<div id="dashboardPage">

<div class="dashboard">

<h2>Daily Calories</h2>

<p>Goal: <span id="goal">2200</span></p>

<p>Consumed: <span id="consumed">0</span></p>

<p>Remaining: <span id="remaining">2200</span></p>

<div class="progress-bar">
<div id="progress"></div>
</div>

</div>

</div>

<div id="foodPage" style="display:none">

<h2>Add Food</h2>

<input id="foodName" placeholder="Food name">

<input id="foodCalories" placeholder="Calories">

<button onclick="addFood()">Add Food</button>

<ul id="foodList"></ul>

</div>

<div id="workoutPage" style="display:none">

<h2>Workout Log</h2>

<input id="exerciseName" placeholder="Exercise">

<input id="sets" placeholder="Sets">

<input id="reps" placeholder="Reps">

<button onclick="addWorkout()">Add Workout</button>

<ul id="workoutList"></ul>

</div>

<div id="profilePage" style="display:none">

<h2>Profile</h2>

<p id="usernameDisplay"></p>

<button onclick="logout()">Logout</button>

</div>

<div class="navBar">

<button onclick="showPage('dashboardPage')">Home</button>

<button onclick="showPage('foodPage')">Food</button>

<button onclick="showPage('workoutPage')">Workouts</button>

<button onclick="showPage('profilePage')">Profile</button>

</div>

<script src="app.js"></script>

</body>

</html>
