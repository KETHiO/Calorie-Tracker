<!DOCTYPE html>
<html>

<head>
<title>FitForge</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

</head>

<body>

<h1>🏋️ FitForge</h1>

<!-- DASHBOARD -->

<div id="dashboardPage">

<div class="dashboard">

<h2>Daily Calories</h2>

<p>Consumed: <span id="consumed">0</span></p>

</div>

</div>



<!-- FOOD PAGE -->

<div id="foodPage" style="display:none">

<h2>Add Food</h2>

<input id="foodName" placeholder="Food name">

<input id="foodCalories" placeholder="Calories">

<button onclick="addFood()">Add Food</button>

<button onclick="startScanner()">📷 Scan Barcode</button>

<div id="scanner"></div>

<ul id="foodList"></ul>

</div>



<!-- WORKOUT BUILDER -->

<div id="workoutPage" style="display:none">

<h2>Workout Builder</h2>

<select id="muscleSelect">

<option value="chest">Chest</option>
<option value="back">Back</option>
<option value="legs">Legs</option>
<option value="shoulders">Shoulders</option>
<option value="arms">Arms</option>

</select>

<button onclick="generateWorkout()">Generate Workout</button>

<button onclick="startWorkout()">Start Workout</button>

<ul id="generatedWorkout"></ul>

</div>



<!-- WORKOUT SESSION -->

<div id="sessionPage" style="display:none">

<h2 id="sessionExercise"></h2>

<p>Sets Completed: <span id="setCounter">0</span>/3</p>

<button onclick="completeSet()">Complete Set</button>

<h3 id="timer">60</h3>

<button onclick="startTimer()">Start Rest</button>

<button onclick="nextExercise()">Next Exercise</button>

</div>



<!-- NAVIGATION -->

<div class="navBar">

<button onclick="showPage('dashboardPage')">🏠 Home</button>

<button onclick="showPage('foodPage')">🍎 Food</button>

<button onclick="showPage('workoutPage')">💪 Workout</button>

</div>

<script src="app.js"></script>

</body>

</html>
