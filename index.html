<!DOCTYPE html>
<html>
<head>

<title>FitForge</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0072ff">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

</head>

<body>

<h1>🏋️ FitForge</h1>

<!-- DASHBOARD -->

<div id="dashboardPage">

<div class="dashboard">

<h2>Daily Calories</h2>

<div class="ringContainer">

<svg width="160" height="160">

<circle cx="80" cy="80" r="70" stroke="#eee" stroke-width="12" fill="none"/>

<circle id="progressRing"
cx="80"
cy="80"
r="70"
stroke="#00c6ff"
stroke-width="12"
fill="none"
stroke-dasharray="440"
stroke-dashoffset="440"/>

</svg>

<div class="ringText">

<p id="consumed">0</p>
<span>cal</span>

</div>

</div>

</div>

</div>


<!-- FOOD PAGE -->

<div id="foodPage" style="display:none">

<h2>Add Food</h2>

<input id="foodName" placeholder="Food name">
<input id="foodCalories" placeholder="Calories">
<input id="foodProtein" placeholder="Protein">
<input id="foodCarbs" placeholder="Carbs">
<input id="foodFat" placeholder="Fat">

<button onclick="addFood()">Add Food</button>

<button onclick="startScanner()">📷 Scan Barcode</button>

<div id="scanner"></div>

<ul id="foodList"></ul>

</div>


<!-- WORKOUT PAGE -->

<div id="workoutPage" style="display:none">

<h2>Muscle Trainer</h2>

<div class="bodyContainer">

<img src="https://i.imgur.com/8QfQG8P.png" class="body">

<div class="muscle chest" id="chest"></div>
<div class="muscle shoulders" id="shoulders"></div>
<div class="muscle arms" id="arms"></div>
<div class="muscle legs" id="legs"></div>

</div>

<h2>Workout Generator</h2>

<select id="muscleSelect">

<option value="chest">Chest</option>
<option value="shoulders">Shoulders</option>
<option value="arms">Arms</option>
<option value="legs">Legs</option>

</select>

<button onclick="generateWorkout()">Generate Workout</button>

<button onclick="startWorkout()">Start Workout</button>

<ul id="generatedWorkout"></ul>

</div>


<!-- SESSION -->

<div id="sessionPage" style="display:none">

<h2 id="sessionExercise"></h2>

<p>Sets Completed: <span id="setCounter">0</span>/3</p>

<button onclick="completeSet()">Complete Set</button>

<h3 id="timer">60</h3>

<button onclick="startTimer()">Start Rest</button>

<button onclick="nextExercise()">Next Exercise</button>

</div>


<!-- NAV -->

<div class="navBar">

<button onclick="showPage('dashboardPage')">🏠 Home</button>
<button onclick="showPage('foodPage')">🍎 Food</button>
<button onclick="showPage('workoutPage')">💪 Workout</button>

</div>

<script src="app.js"></script>

</body>
</html>
